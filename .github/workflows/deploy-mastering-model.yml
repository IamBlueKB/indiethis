name: Deploy Replicate Mastering Model

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cog
        run: |
          sudo curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/latest/download/cog_Linux_x86_64
          sudo chmod +x /usr/local/bin/cog

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push model to Replicate
        working-directory: replicate/mastering
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          echo $REPLICATE_API_TOKEN | docker login r8.im -u ${{ secrets.REPLICATE_USERNAME }} --password-stdin

          for attempt in 1 2 3; do
            echo "==> Push attempt $attempt/3..."
            cog push r8.im/${{ secrets.REPLICATE_USERNAME }}/indiethis-mastering && break
            echo "Push failed (attempt $attempt). Waiting 60s before retry..."
            sleep 60
          done
